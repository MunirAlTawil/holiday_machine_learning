services:
  postgres:
    image: postgres:16
    container_name: holiday_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: holiday
      POSTGRES_USER: holiday
      POSTGRES_PASSWORD: holiday
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U holiday"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: holiday_api
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: holiday
      POSTGRES_USER: holiday
      POSTGRES_PASSWORD: holiday
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4j_password}
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: holiday_dashboard
    ports:
      - "8501:8501"
    environment:
      API_BASE_URL: http://api:8000
      DOCKER_ENV: 1
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  batch_pipeline:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: holiday_batch_pipeline
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: holiday
      POSTGRES_USER: holiday
      POSTGRES_PASSWORD: holiday
      API_BASE_URL: http://api:8000
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    command: python pipelines/batch/run_pipeline.py
    profiles:
      - manual

  holiday_scheduler:
    build:
      context: .
      dockerfile: Dockerfile.scheduler
    container_name: holiday_scheduler
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: holiday
      POSTGRES_USER: holiday
      POSTGRES_PASSWORD: holiday
      DATATOURISME_API_KEY: ${DATATOURISME_API_KEY}
      DATATOURISME_BASE_URL: ${DATATOURISME_BASE_URL:-https://api.datatourisme.fr}
      DATABASE_URL: ${DATABASE_URL:-}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4j_password}
    volumes:
      - ./src:/app/src:ro
      - ./pipelines:/app/pipelines:ro
      - ./sql:/app/sql:ro
      - scheduler_logs:/var/log
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - default

  neo4j:
    image: neo4j:5.15-community
    container_name: holiday_neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4j_password}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 2G
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

volumes:
  postgres_data:
  scheduler_logs:
  neo4j_data:
  neo4j_logs:

networks:
  default:
    name: holiday_network

